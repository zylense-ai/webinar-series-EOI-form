<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d">
  <title id="t">AI Audit Visual</title>
  <desc id="d">Premium illustration for AI readiness audit card with dashboard and insights motifs</desc>
  <defs>
    <linearGradient id="auditBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="scoreRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" rx="36" fill="url(#auditBg)"/>
  <circle cx="1010" cy="120" r="160" fill="#ffffff" fill-opacity="0.09"/>
  <circle cx="140" cy="620" r="140" fill="#ffffff" fill-opacity="0.07"/>

  <rect x="120" y="100" width="960" height="500" rx="30" fill="#04162d" fill-opacity="0.52"/>
  <rect x="160" y="150" width="560" height="400" rx="24" fill="#0f2848" fill-opacity="0.84"/>
  <rect x="760" y="150" width="280" height="190" rx="24" fill="#0f2848" fill-opacity="0.84"/>
  <rect x="760" y="360" width="280" height="190" rx="24" fill="#0f2848" fill-opacity="0.84"/>

  <text x="200" y="210" fill="#dbeafe" font-size="34" font-family="Arial, sans-serif" font-weight="700">AI Audit Dashboard</text>
  <text x="200" y="245" fill="#bae6fd" font-size="23" font-family="Arial, sans-serif">Readiness, risk signals, and automation opportunity map</text>

  <rect x="200" y="285" width="140" height="16" rx="8" fill="#e0f2fe" fill-opacity="0.65"/>
  <rect x="200" y="320" width="260" height="16" rx="8" fill="url(#panelGlow)" fill-opacity="0.9"/>
  <rect x="200" y="355" width="220" height="16" rx="8" fill="#67e8f9" fill-opacity="0.78"/>
  <rect x="200" y="390" width="310" height="16" rx="8" fill="#22d3ee" fill-opacity="0.72"/>

  <polyline points="210,495 300,445 390,465 480,405 570,430 660,370" fill="none" stroke="#dbeafe" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="210" cy="495" r="8" fill="#dbeafe"/>
  <circle cx="300" cy="445" r="8" fill="#dbeafe"/>
  <circle cx="390" cy="465" r="8" fill="#dbeafe"/>
  <circle cx="480" cy="405" r="8" fill="#dbeafe"/>
  <circle cx="570" cy="430" r="8" fill="#dbeafe"/>
  <circle cx="660" cy="370" r="8" fill="#dbeafe"/>

  <circle cx="900" cy="246" r="62" fill="none" stroke="#1e293b" stroke-width="18"/>
  <circle cx="900" cy="246" r="62" fill="none" stroke="url(#scoreRing)" stroke-width="18" stroke-linecap="round" stroke-dasharray="300 390" transform="rotate(-90 900 246)"/>
  <text x="870" y="255" fill="#fde68a" font-size="34" font-family="Arial, sans-serif" font-weight="700">78</text>
  <text x="822" y="298" fill="#e2e8f0" font-size="18" font-family="Arial, sans-serif">Readiness Score</text>

  <rect x="810" y="400" width="48" height="120" rx="8" fill="#1e40af"/>
  <rect x="872" y="365" width="48" height="155" rx="8" fill="#0284c7"/>
  <rect x="934" y="430" width="48" height="90" rx="8" fill="#0ea5e9"/>
  <text x="812" y="548" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">Ops</text>
  <text x="874" y="548" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">Growth</text>
  <text x="931" y="548" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">Risk</text>
