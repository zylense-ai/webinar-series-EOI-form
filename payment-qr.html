<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Checkout</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .payment-shell {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      padding: 18px;
    }

    .payment-shell h1 {
      margin-bottom: 8px;
    }

    .payment-note {
      margin: 0 0 12px 0;
      color: #c5d9ff;
    }

    .payable-line {
      margin: 8px 0 10px 0;
      color: #8ff9ca;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .payment-meta {
      margin: 8px 0 0 0;
      color: #d6e7ff;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .pay-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    #paymentStatus {
      margin-top: 14px;
      color: #ffd9a8;
      display: none;
      font-weight: 600;
    }

    #paidMessage {
      margin-top: 16px;
      display: none;
      font-weight: 700;
      color: #7bf1a8;
      background: rgba(17, 100, 62, 0.24);
      border: 1px solid rgba(123, 241, 168, 0.4);
      border-radius: 12px;
      padding: 10px 14px;
    }
  </style>
</head>
<body class="theme-home">
  <main class="layout reveal">
    <a class="home-link" href="registration.html">&larr; Back to registration</a>

    <section class="section card-surface payment-shell">
      <h1>Complete Payment</h1>
      <p class="payment-note">Click Pay Now to pay securely via Razorpay.</p>
      <p id="payableLine" class="payable-line">Please pay Rs 0</p>
      <p id="paymentMeta" class="payment-meta"></p>

      <div class="pay-btn-wrap">
        <button id="payNowButton" class="reg-submit" type="button">Pay Now</button>
      </div>

      <p id="paymentStatus"></p>
      <p id="paidMessage">Payment successful. You have registered successfully. Thank you.</p>
    </section>
  </main>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyWRNWWhtVElJ0ljsvTj11N5KE_sQ-CRguomTR8bUtSe-VMOjG3K0Xv1o9I_b7SxeI/exec";
    const REGISTRATION_STORAGE_KEY = "pendingRegistrationPayload";
    const payNowButton = document.getElementById("payNowButton");
    const payableLine = document.getElementById("payableLine");
    const paymentMeta = document.getElementById("paymentMeta");
    const paymentStatus = document.getElementById("paymentStatus");
    const paidMessage = document.getElementById("paidMessage");

    const params = new URLSearchParams(window.location.search);
    const amount = Number(params.get("amount") || 0);
    const webinars = params.get("webinars") || "";
    const dates = params.get("dates") || "";
    const name = params.get("name") || "";
    const email = params.get("email") || "";
    const phone = params.get("phone") || "";

    const amountInPaise = Math.round(amount * 100);

    payableLine.textContent = `Please pay Rs ${amount}`;

    if (webinars || dates) {
      const webinarText = webinars ? webinars.split(" | ").join(", ") : "N/A";
      const dateText = dates ? dates.split(" | ").join(" | ") : "N/A";
      paymentMeta.innerHTML = `<b>Selected Webinar(s):</b> ${webinarText}<br><b>Selected Date(s):</b> ${dateText}`;
    }

    function setStatus(message) {
      paymentStatus.textContent = message;
      paymentStatus.style.display = "block";
    }

    function resetButton() {
      payNowButton.disabled = false;
      payNowButton.textContent = "Pay Now";
    }

    function getPendingRegistrationPayload() {
      const storedPayload = sessionStorage.getItem(REGISTRATION_STORAGE_KEY);
      if (!storedPayload) return null;

      try {
        const parsed = JSON.parse(storedPayload);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function postToGoogleSheet(data) {
      return new Promise((resolve) => {
        let frame = document.getElementById("gsheetSubmitFrame");
        if (!frame) {
          frame = document.createElement("iframe");
          frame.id = "gsheetSubmitFrame";
          frame.name = "gsheetSubmitFrame";
          frame.style.display = "none";
          document.body.appendChild(frame);
        }

        const hiddenForm = document.createElement("form");
        hiddenForm.method = "POST";
        hiddenForm.action = scriptUrl;
        hiddenForm.target = "gsheetSubmitFrame";
        hiddenForm.style.display = "none";

        Object.entries(data).forEach(([key, value]) => {
          const field = document.createElement("input");
          field.type = "hidden";
          field.name = key;
          field.value = value;
          hiddenForm.appendChild(field);
        });

        let resolved = false;
        const finish = () => {
          if (resolved) return;
          resolved = true;
          try { hiddenForm.remove(); } catch (_) {}
          resolve();
        };

        const onFrameLoad = () => {
          frame.removeEventListener("load", onFrameLoad);
          finish();
        };
        frame.addEventListener("load", onFrameLoad, { once: true });

        document.body.appendChild(hiddenForm);
        hiddenForm.submit();

        setTimeout(() => {
          frame.removeEventListener("load", onFrameLoad);
          finish();
        }, 1800);
      });
    }

    async function readApiResponse(response) {
      const raw = await response.text();
      try {
        return { data: JSON.parse(raw), raw };
      } catch (_) {
        return { data: null, raw };
      }
    }

    async function createOrder() {
      const response = await fetch("/api/create-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          amount: amountInPaise,
          currency: "INR",
          receipt: `webinar_${Date.now()}`
        })
      });

      const { data, raw } = await readApiResponse(response);

      if (!response.ok) {
        throw new Error(data?.error || raw || "Could not create order");
      }

      if (!data) {
        throw new Error("Invalid response from create-order API");
      }

      return data;
    }

    async function verifyPayment(paymentData) {
      const response = await fetch("/api/verify-payment", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(paymentData)
      });

      const { data, raw } = await readApiResponse(response);

      if (!response.ok) {
        throw new Error(data?.error || raw || "Payment verification failed");
      }

      if (!data) {
        throw new Error("Invalid response from verify-payment API");
      }

      return data;
    }

    payNowButton.addEventListener("click", async () => {
      paidMessage.style.display = "none";
      paymentStatus.style.display = "none";

      if (amountInPaise < 100) {
        setStatus("Amount must be at least 100 paise (Rs 1). Please go back and update selection.");
        return;
      }

      if (!getPendingRegistrationPayload()) {
        setStatus("Registration details are missing. Please go back and submit the form again.");
        return;
      }

      if (typeof window.Razorpay === "undefined") {
        setStatus("Razorpay checkout failed to load. Please refresh and try again.");
        return;
      }

      payNowButton.disabled = true;
      payNowButton.textContent = "Opening Checkout...";

      try {
        const order = await createOrder();

        const options = {
          key: order.key_id,
          amount: order.amount,
          currency: order.currency,
          name: "AI Webinar Series",
          description: "Webinar registration payment",
          order_id: order.order_id,
          prefill: {
            name,
            email,
            contact: phone
          },
          handler: async (response) => {
            try {
              await verifyPayment(response);
              const registrationPayload = getPendingRegistrationPayload();
              if (!registrationPayload) {
                throw new Error("Payment succeeded, but registration details are missing. Contact support.");
              }

              await postToGoogleSheet(registrationPayload);
              sessionStorage.removeItem(REGISTRATION_STORAGE_KEY);

              payNowButton.textContent = "Payment Successful";
              setStatus("Payment verified and registration submitted successfully.");
              paidMessage.style.display = "block";
            } catch (error) {
              resetButton();
              setStatus(error.message || "Payment verification failed.");
            }
          },
          modal: {
            ondismiss: () => {
              resetButton();
              setStatus("Payment cancelled. You can try again.");
            }
          }
        };

        const rzp = new window.Razorpay(options);

        rzp.on("payment.failed", (response) => {
          resetButton();
          const description = response?.error?.description || "Payment failed. Please try again.";
          setStatus(description);
        });

        rzp.open();
      } catch (error) {
        resetButton();
        setStatus(error.message || "Unable to start payment.");
      }
    });
  </script>
  <script src="ui-effects.js"></script>
</body>
</html>
